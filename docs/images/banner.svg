<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009688"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  <!-- Book icon with annotation marks -->
  <g transform="translate(80, 100)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M0,-35 C0,-35 -40,-38 -40,-25 L-40,25 C-40,30 0,28 0,28"/>
    <!-- Right page -->
    <path d="M0,-35 C0,-35 40,-38 40,-25 L40,25 C40,30 0,28 0,28"/>
    <!-- Spine -->
    <line x1="0" y1="-35" x2="0" y2="28"/>
    <!-- Text lines on left page -->
    <line x1="-30" y1="-18" x2="-10" y2="-18" stroke-opacity="0.6"/>
    <line x1="-30" y1="-8" x2="-10" y2="-8" stroke-opacity="0.6"/>
    <line x1="-30" y1="2" x2="-10" y2="2" stroke-opacity="0.6"/>
    <line x1="-30" y1="12" x2="-15" y2="12" stroke-opacity="0.6"/>
    <!-- Annotation marks on right page -->
    <line x1="10" y1="-18" x2="30" y2="-18" stroke-opacity="0.6"/>
    <line x1="10" y1="-8" x2="30" y2="-8" stroke-opacity="0.6"/>
    <!-- Note/pencil icon -->
    <g transform="translate(32, 8)" stroke-width="2">
      <path d="M0,0 L8,-8 L12,-4 L4,4 Z" fill="white" fill-opacity="0.3"/>
      <line x1="0" y1="0" x2="-2" y2="6"/>
    </g>
  </g>
  <!-- Title -->
  <text x="380" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="50" font-weight="bold" fill="white">AskePub</text>
  <!-- Subtitle -->
  <text x="380" y="125" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="white" fill-opacity="0.85">AI-powered ePub study notes via Telegram</text>
  <!-- Decorative elements on right -->
  <g transform="translate(800, 40)" stroke="white" stroke-opacity="0.12" fill="none" stroke-width="1.5">
    <circle cx="0" cy="0" r="20"/>
    <circle cx="0" cy="0" r="35"/>
    <circle cx="0" cy="0" r="50"/>
  </g>
  <g transform="translate(830, 150)" stroke="white" stroke-opacity="0.08" fill="none" stroke-width="1.5">
    <rect x="-15" y="-15" width="30" height="30" rx="4" transform="rotate(15)"/>
    <rect x="-25" y="-25" width="50" height="50" rx="6" transform="rotate(15)"/>
  </g>
</svg>