services:

  askepub:
    image: drumsergio/askepub:2.0.0
    # build: .
    environment:
      - TOKEN=YOUR-TELEGRAM-BOT-TOKEN
      - TOKEN_NOTIFY=YOUR-NOTIFICATION-BOT-TOKEN
      - OPENAI_API_KEY=YOUR-OPENAI-API-KEY
      - ADMIN_ID=YOUR-TELEGRAM-USER-ID
      - USER_IDS=ALLOWED-USER-IDS,SEPARATED-BY,COMMAS
    volumes:
      - dbs:/app/dbs
      - userBackups:/app/userBackups

volumes:
  dbs:
  userBackups:
